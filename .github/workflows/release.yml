name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # OIDC for npm Trusted Publishing + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm

      # npm Trusted Publishing (OIDC) needs a recent npm; the one bundled with
      # Node 20 is too old. No NPM_TOKEN — auth is short-lived via OIDC.
      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Publish to npm (Trusted Publishing)
        run: npm publish --provenance
